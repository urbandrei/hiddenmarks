<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Marks - Game Tester</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; font-size: 14px; }

  #setup { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #0f3460; }
  #setup label { font-weight: 600; }
  #setup select, #setup button { padding: 6px 14px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 14px; }
  #setup button:hover { background: #1a4a8a; }
  #setup button:disabled { opacity: 0.4; cursor: default; }
  #status { margin-left: auto; font-weight: 600; color: #e94560; }

  .container { display: flex; height: calc(100vh - 48px); }

  /* Left sidebar */
  .sidebar { width: 200px; background: #16213e; border-right: 2px solid #0f3460; display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar h3 { padding: 10px 12px 6px; font-size: 13px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

  .view-selector { padding: 4px 12px; }
  .view-selector label { display: block; padding: 6px 8px; cursor: pointer; border-radius: 4px; }
  .view-selector label:hover { background: #0f3460; }
  .view-selector input[type="radio"] { margin-right: 6px; }
  .view-selector .active-turn { color: #e94560; font-weight: bold; }

  .actions { padding: 8px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .actions button { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 13px; text-align: center; }
  .actions button:hover:not(:disabled) { background: #1a4a8a; }
  .actions button:disabled { opacity: 0.3; cursor: default; }
  .actions button.primary { background: #e94560; border-color: #e94560; font-weight: 600; }
  .actions button.primary:hover:not(:disabled) { background: #c73650; }
  .actions .action-group { border-top: 1px solid #0f3460; padding-top: 6px; margin-top: 2px; }
  .actions .action-group label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .actions select { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; font-size: 13px; }

  /* Main area */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .board { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .player-area { background: #16213e; border-radius: 6px; padding: 10px; border: 1px solid #0f3460; }
  .player-area.dead { opacity: 0.4; }
  .player-area.current-turn { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.3); }
  .player-area h4 { margin-bottom: 8px; font-size: 13px; }
  .player-area h4 .seat { color: #e94560; }

  .zone { margin-bottom: 6px; }
  .zone-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
  .zone-cards { display: flex; flex-wrap: wrap; gap: 4px; min-height: 22px; align-items: center; }

  .card { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 12px; font-family: monospace; cursor: default; }
  .card.white { background: #f5f5f5; color: #333; }
  .card.blue { background: #2196f3; color: #fff; }
  .card.red { background: #e53935; color: #fff; }
  .card.mark { background: #9c27b0; color: #fff; }
  .card.unknown { background: #444; color: #aaa; }

  /* Hand card with action buttons */
  .hand-card { display: inline-flex; align-items: center; gap: 2px; background: #0f3460; border-radius: 4px; padding: 2px; }
  .hand-card .card { border-radius: 3px 0 0 3px; }
  .hand-card .card-actions { display: flex; gap: 1px; }
  .hand-card .card-btn { padding: 2px 5px; font-size: 10px; border: none; border-radius: 2px; cursor: pointer; font-weight: 600; font-family: 'Segoe UI', system-ui, sans-serif; }
  .hand-card .card-btn:hover:not(:disabled) { filter: brightness(1.2); }
  .hand-card .card-btn:disabled { opacity: 0.3; cursor: default; }
  .hand-card .btn-play { background: #e94560; color: #fff; }
  .hand-card .btn-bank { background: #4caf50; color: #fff; }

  .center-zones { grid-column: 1 / -1; background: #16213e; border-radius: 6px; padding: 10px; border: 1px solid #0f3460; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }

  /* Draw pile scrollable */
  .draw-pile-cards { max-height: 80px; overflow-y: auto; }

  /* Target picker modal */
  .target-picker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #16213e; border: 2px solid #e94560; border-radius: 8px; padding: 16px; z-index: 100; min-width: 200px; }
  .target-picker.active { display: block; }
  .target-picker h4 { margin-bottom: 10px; color: #e94560; }
  .target-picker button { display: block; width: 100%; padding: 8px; margin-bottom: 4px; background: #0f3460; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .target-picker button:hover { background: #1a4a8a; }
  .target-picker .cancel { background: #333; margin-top: 8px; }
  .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .overlay.active { display: block; }

  /* Event log */
  .log { height: 180px; border-top: 2px solid #0f3460; background: #0d1117; overflow-y: auto; padding: 8px 12px; font-family: monospace; font-size: 12px; }
  .log div { padding: 1px 0; }
  .log .error { color: #e94560; }
  .log .info { color: #4caf50; }
  .log .action { color: #64b5f6; }
  .log .state { color: #888; }

  /* Reaction overlay */
  .reaction-bar { display: none; background: #e94560; color: #fff; padding: 10px 20px; text-align: center; font-weight: 600; }
  .reaction-bar.active { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .reaction-bar button { background: #fff; color: #e94560; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; }
  .reaction-bar button:hover { background: #f0f0f0; }
</style>
</head>
<body>

<div id="setup">
  <label>Players:</label>
  <select id="playerCount">
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4" selected>4</option>
  </select>
  <button id="btnStart" onclick="setupGame()">Start Game</button>
  <button id="btnReset" onclick="location.reload()">Reset</button>
  <span id="status">Not started</span>
</div>

<div id="reactionBar" class="reaction-bar"></div>

<div id="overlay" class="overlay" onclick="hideTargetPicker()"></div>
<div id="targetPicker" class="target-picker">
  <h4 id="pickerTitle">Select Target</h4>
  <div id="pickerButtons"></div>
  <button class="cancel" onclick="hideTargetPicker()">Cancel</button>
</div>

<div class="container">
  <div class="sidebar">
    <h3>View As</h3>
    <div id="viewSelector" class="view-selector"></div>

    <h3>Actions</h3>
    <div id="actionPanel" class="actions">
      <button class="primary" onclick="doAction('draw')" id="btnDraw" disabled>Draw Card</button>

      <div class="action-group" id="bountyGroup" style="display:none">
        <label>Use Bounty</label>
        <select id="bountySelect"><option value="">-- bounty --</option></select>
        <select id="bountyTarget"><option value="">-- target --</option></select>
        <button onclick="doBountySelected()">Use Bounty</button>
      </div>

      <button onclick="doAction('end-turn')" id="btnEndTurn" disabled>End Turn</button>
    </div>
  </div>

  <div class="main">
    <div id="board" class="board"></div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const API = '';
let gameId = null;
let roomCode = null;
let numPlayers = 4;
let playerIds = {};
let sockets = {};
let views = {};
let currentView = 1;
let gameStarted = false;
let pendingPlayCardId = null; // card waiting for target selection

// Cards that need a target player
const TARGET_CARDS = ['unmasked','alter ego','body swap','tied up','arson',
  'heavy hand','backfire','bloodshot','red handed','counterfeit','gold digger'];
// Cards that need TWO targets
const TWO_TARGET_CARDS = ['body swap'];

// ========== Setup ==========

async function setupGame() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  numPlayers = parseInt(document.getElementById('playerCount').value);
  setStatus('Setting up...');

  try {
    for (let i = 1; i <= numPlayers; i++) {
      const res = await fetch(`${API}/api/players`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ displayName: `Player ${i}` }),
      });
      const player = await res.json();
      playerIds[i] = player.id;
      log(`Created Player ${i}: ${player.id.slice(0,8)}...`, 'info');
    }

    const gameRes = await fetch(`${API}/api/games`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Player-Id': playerIds[1] },
    });
    const game = await gameRes.json();
    gameId = game.id;
    roomCode = game.roomCode;
    log(`Game created: ${roomCode}`, 'info');

    for (let i = 2; i <= numPlayers; i++) {
      await fetch(`${API}/api/games/${roomCode}/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Player-Id': playerIds[i] },
      });
      log(`Player ${i} joined`, 'info');
    }

    for (let i = 1; i <= numPlayers; i++) {
      connectSocket(i);
    }

    await new Promise(r => setTimeout(r, 500));

    sockets[1].emit('lobby:start-game');
    setStatus(`Room ${roomCode} — Starting...`);
    buildViewSelector();
    currentView = 1;

  } catch (err) {
    log(`Setup error: ${err.message}`, 'error');
    btn.disabled = false;
  }
}

function connectSocket(seatNum) {
  const socket = io(API, {
    auth: { playerId: playerIds[seatNum], gameId },
  });

  socket.on('game:state', (view) => {
    views[seatNum] = view;
    if (seatNum === currentView) renderBoard();
    updateSidebar();
  });

  socket.on('game:started', (data) => {
    gameStarted = true;
    log(`Game started! Turn ${data.currentTurnNumber}`, 'info');
    setStatus(`Room ${roomCode} — In Progress`);
    updateSidebar();
  });

  socket.on('game:turn-advanced', (data) => {
    log(`Turn advanced to Player ${data.currentPlayerNum} (${data.actionsRemaining} actions)`, 'action');
    updateViewLabels();
    updateSidebar();
  });

  socket.on('game:reaction-start', (data) => {
    log(`Reaction window! ${data.effectType} — eligible: P${data.eligibleReactors.join(', P')}`, 'action');
    showReactionBar(data);
  });

  socket.on('game:reaction-resolve', (data) => {
    log(`Reaction resolved: ${data.blocked ? 'BLOCKED' : 'EXECUTED'}${data.revengeTriggered ? ' (revenge!)' : ''}`, 'action');
    hideReactionBar();
  });

  socket.on('game:victory', (data) => {
    log(`VICTORY! Player ${data.winnerNum} wins!`, 'info');
    setStatus(`Player ${data.winnerNum} wins!`);
  });

  socket.on('game:error', (data) => {
    log(`Error: ${data.message}`, 'error');
  });

  socket.on('connect', () => {
    log(`Socket ${seatNum} connected`, 'state');
  });

  sockets[seatNum] = socket;
}

// ========== View Selector ==========

function buildViewSelector() {
  const container = document.getElementById('viewSelector');
  container.innerHTML = '';
  for (let i = 1; i <= numPlayers; i++) {
    const label = document.createElement('label');
    label.id = `viewLabel${i}`;
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'viewAs';
    radio.value = i;
    radio.checked = i === 1;
    radio.onchange = () => { currentView = i; renderBoard(); updateSidebar(); };
    label.appendChild(radio);
    label.appendChild(document.createTextNode(`Player ${i}`));
    container.appendChild(label);
  }
  updateViewLabels();
}

function updateViewLabels() {
  for (let i = 1; i <= numPlayers; i++) {
    const label = document.getElementById(`viewLabel${i}`);
    if (!label) continue;
    const view = views[i];
    const isTurn = view && view.turn.currentPlayerNum === i;
    label.className = isTurn ? 'active-turn' : '';
  }
}

// ========== Board Rendering ==========

function renderBoard() {
  const view = views[currentView];
  const board = document.getElementById('board');
  if (!view) { board.innerHTML = '<p>Waiting for state...</p>'; return; }

  const { board: zones, memory, turn, playerAlive, bountyState, obfuscationRanges, currentTurnNumber } = view;
  const isMyTurn = turn.currentPlayerNum === currentView;
  const canAct = isMyTurn && turn.actionsRemaining > 0 && playerAlive[currentView];

  let html = '';

  // Player areas
  for (let p = 1; p <= numPlayers; p++) {
    const alive = playerAlive[p];
    const isTurn = turn.currentPlayerNum === p;
    const classes = ['player-area'];
    if (!alive) classes.push('dead');
    if (isTurn) classes.push('current-turn');

    html += `<div class="${classes.join(' ')}">`;
    html += `<h4><span class="seat">P${p}</span> ${alive ? '' : '(DEAD)'} ${isTurn ? `— ${turn.actionsRemaining} actions` : ''}</h4>`;

    // Hand: show with play/bank buttons if this is the current turn player's hand
    const handCards = zones[`p${p}-hand`] || [];
    html += `<div class="zone"><div class="zone-label">Hand (${handCards.length})</div><div class="zone-cards">`;
    if (handCards.length === 0) {
      html += '<span style="color:#555;font-size:11px">empty</span>';
    } else {
      for (const id of handCards) {
        if (p === currentView && canAct) {
          html += renderHandCard(id, memory, obfuscationRanges);
        } else {
          html += renderCard(id, memory, obfuscationRanges);
        }
      }
    }
    html += '</div></div>';

    html += renderZone('Bank', zones[`p${p}-bank`], memory, obfuscationRanges);
    html += renderZone('Mark', zones[`p${p}-mark`], memory, obfuscationRanges);
    html += renderZone('Effect', zones[`p${p}-effect`], memory, obfuscationRanges);

    html += '</div>';
  }

  // Center zones
  html += '<div class="center-zones">';
  html += `<div>${renderDrawPile(zones['draw'] || [], obfuscationRanges)}</div>`;
  html += `<div>${renderZone('Discard', zones['discard'], memory, obfuscationRanges)}</div>`;
  html += `<div>${renderZone('Bounty Zone', zones['bounty'], memory, obfuscationRanges)}</div>`;
  html += `<div>${renderZone('Extra Mark', zones['extra-mark'], memory, obfuscationRanges)}</div>`;
  html += '</div>';

  board.innerHTML = html;
  setStatus(`Room ${roomCode} — Turn ${currentTurnNumber} — P${turn.currentPlayerNum}'s turn (${turn.actionsRemaining} actions)`);
}

function renderDrawPile(cards, ranges) {
  let html = `<div class="zone"><div class="zone-label">Draw Pile (${cards.length})</div>`;
  html += '<div class="zone-cards draw-pile-cards">';
  if (cards.length === 0) {
    html += '<span style="color:#555;font-size:11px">empty</span>';
  } else {
    // Show all cards in draw pile order (top = last element = drawn first)
    // Render in reverse so top-of-pile is shown first
    for (let i = cards.length - 1; i >= 0; i--) {
      const id = cards[i];
      html += renderCard(id, {}, ranges); // empty memory — draw pile cards are unknown
    }
  }
  html += '</div></div>';
  return html;
}

function renderHandCard(id, memory, ranges) {
  const strId = String(id);
  const known = memory[strId];
  const cardHtml = renderCardInner(id, memory, ranges);
  const knownName = known?.name || '';

  let html = `<span class="hand-card">${cardHtml}<span class="card-actions">`;
  html += `<button class="card-btn btn-play" onclick="onPlayCard(${id})" title="Play">P</button>`;
  html += `<button class="card-btn btn-bank" onclick="onBankCard(${id})" title="Bank">B</button>`;
  html += '</span></span>';
  return html;
}

function renderZone(label, cards, memory, ranges) {
  let html = `<div class="zone"><div class="zone-label">${label} (${(cards||[]).length})</div><div class="zone-cards">`;
  if (!cards || cards.length === 0) {
    html += '<span style="color:#555;font-size:11px">empty</span>';
  } else {
    for (const id of cards) {
      html += renderCard(id, memory, ranges);
    }
  }
  html += '</div></div>';
  return html;
}

function renderCard(id, memory, ranges) {
  return `<span>${renderCardInner(id, memory, ranges)}</span>`;
}

function renderCardInner(id, memory, ranges) {
  const strId = String(id);
  const known = memory[strId];

  if (typeof id === 'string' && id.startsWith('M')) {
    if (known) {
      return `<span class="card mark" title="${known.name || known.suit}">${id} (${known.suit || known.name})</span>`;
    }
    return `<span class="card mark">${id}</span>`;
  }

  const numId = Number(id);
  let colorClass = 'unknown';
  if (ranges) {
    if (numId >= ranges.white.min && numId <= ranges.white.max) colorClass = 'white';
    else if (numId >= ranges.blue.min && numId <= ranges.blue.max) colorClass = 'blue';
    else if (numId >= ranges.red.min && numId <= ranges.red.max) colorClass = 'red';
  }

  if (known) {
    return `<span class="card ${colorClass}" title="cost:${known.cost}">#${id} (${known.name})</span>`;
  }
  return `<span class="card ${colorClass}">#${id}</span>`;
}

// ========== Sidebar ==========

function updateSidebar() {
  const view = views[currentView];
  if (!view || !gameStarted) return;

  const { board: zones, memory, turn, playerAlive } = view;
  const isMyTurn = turn.currentPlayerNum === currentView;
  const canAct = isMyTurn && turn.actionsRemaining > 0 && playerAlive[currentView];
  const isReacting = view.reactionState && view.reactionState.active;

  document.getElementById('btnDraw').disabled = !canAct || isReacting;
  document.getElementById('btnEndTurn').disabled = !isMyTurn || isReacting;

  // Bounty zone
  const bountyZone = zones['bounty'] || [];
  const bountyGroup = document.getElementById('bountyGroup');
  if (bountyZone.length > 0 && canAct && !isReacting) {
    bountyGroup.style.display = '';
    const bountySelect = document.getElementById('bountySelect');
    bountySelect.innerHTML = '<option value="">-- bounty --</option>';
    for (const id of bountyZone) {
      const known = memory[String(id)];
      const label = known ? `#${id} (${known.name})` : `#${id}`;
      bountySelect.innerHTML += `<option value="${id}">${label}</option>`;
    }
    const bountyTarget = document.getElementById('bountyTarget');
    bountyTarget.innerHTML = '<option value="">-- target --</option>';
    for (let p = 1; p <= numPlayers; p++) {
      if (!playerAlive[p]) continue;
      bountyTarget.innerHTML += `<option value="${p}">Player ${p}</option>`;
    }
  } else {
    bountyGroup.style.display = 'none';
  }
}

// ========== Actions ==========

function onBankCard(cardId) {
  const view = views[currentView];
  if (!view) return;
  const turnPlayer = view.turn.currentPlayerNum;
  sockets[turnPlayer].emit('game:action', { type: 'bank', cardId });
  const known = view.memory[String(cardId)];
  log(`P${turnPlayer} → bank #${cardId}${known ? ` (${known.name})` : ''}`, 'action');
}

function onPlayCard(cardId) {
  const view = views[currentView];
  if (!view) return;
  const known = view.memory[String(cardId)];
  const cardName = known?.name || '';

  // Check if this card needs a target
  if (TARGET_CARDS.includes(cardName)) {
    pendingPlayCardId = cardId;
    showTargetPicker(cardName, cardId);
    return;
  }

  // No target needed — play directly
  const turnPlayer = view.turn.currentPlayerNum;
  sockets[turnPlayer].emit('game:action', { type: 'play', cardId });
  log(`P${turnPlayer} → play #${cardId}${known ? ` (${known.name})` : ''}`, 'action');
}

function showTargetPicker(cardName, cardId, firstTarget) {
  const view = views[currentView];
  if (!view) return;

  const capturedCardId = cardId;
  const turnPlayer = view.turn.currentPlayerNum;
  const isSecondPick = firstTarget !== undefined;
  const needsTwoTargets = TWO_TARGET_CARDS.includes(cardName);

  const title = isSecondPick
    ? `${cardName} — Select 2nd Target`
    : `${cardName} — Select Target`;
  document.getElementById('pickerTitle').textContent = title;
  const btns = document.getElementById('pickerButtons');
  btns.innerHTML = '';

  for (let p = 1; p <= numPlayers; p++) {
    if (isSecondPick && p === firstTarget) continue;
    // Most cards can't target self (except alter ego and body swap)
    if (!isSecondPick && p === currentView && cardName !== 'alter ego' && cardName !== 'body swap') continue;
    if (!view.playerAlive[p]) continue;

    const targetP = p;
    const btn = document.createElement('button');
    btn.textContent = `Player ${p}`;
    btn.onclick = () => {
      if (needsTwoTargets && !isSecondPick) {
        // Need second target — show picker again
        showTargetPicker(cardName, capturedCardId, targetP);
      } else {
        hideTargetPicker();
        const action = { type: 'play', cardId: capturedCardId, target: isSecondPick ? firstTarget : targetP };
        if (isSecondPick) action.target2 = targetP;
        sockets[turnPlayer].emit('game:action', action);
        const known = view.memory[String(capturedCardId)];
        const targetStr = isSecondPick ? `P${firstTarget} & P${targetP}` : `P${targetP}`;
        log(`P${turnPlayer} → play #${capturedCardId}${known ? ` (${known.name})` : ''} on ${targetStr}`, 'action');
      }
    };
    btns.appendChild(btn);
  }

  document.getElementById('overlay').className = 'overlay active';
  document.getElementById('targetPicker').className = 'target-picker active';
}

function hideTargetPicker() {
  document.getElementById('overlay').className = 'overlay';
  document.getElementById('targetPicker').className = 'target-picker';
  pendingPlayCardId = null;
}

function doAction(type) {
  const view = views[currentView];
  if (!view) return;
  const turnPlayer = view.turn.currentPlayerNum;
  const socket = sockets[turnPlayer];
  if (!socket) return;
  socket.emit('game:action', { type });
  log(`P${turnPlayer} → ${type}`, 'action');
}

function doBountySelected() {
  const view = views[currentView];
  if (!view) return;
  const turnPlayer = view.turn.currentPlayerNum;
  const bountyCardId = Number(document.getElementById('bountySelect').value);
  const target = Number(document.getElementById('bountyTarget').value);
  if (!bountyCardId || !target) return;
  sockets[turnPlayer].emit('game:action', { type: 'bounty-use', bountyCardId, target });
  log(`P${turnPlayer} → bounty-use #${bountyCardId} on P${target}`, 'action');
}

// ========== Reaction UI ==========

function showReactionBar(data) {
  const bar = document.getElementById('reactionBar');
  bar.className = 'reaction-bar active';
  let html = `<span>Reaction Window (${data.effectType}) — Eligible: P${data.eligibleReactors.join(', P')}</span>`;

  for (const reactorNum of data.eligibleReactors) {
    const view = views[reactorNum];
    if (!view) continue;
    const hand = view.board[`p${reactorNum}-hand`] || [];
    for (const id of hand) {
      const known = view.memory[String(id)];
      if (known && ['snub', 'blind spot', 'revenge'].includes(known.name)) {
        html += `<button onclick="doReact(${reactorNum}, ${id})">P${reactorNum}: ${known.name}</button>`;
      }
    }
    html += `<button onclick="doReactPass(${reactorNum})" style="background:#666;color:#fff">P${reactorNum}: Pass</button>`;
  }

  bar.innerHTML = html;
}

function hideReactionBar() {
  document.getElementById('reactionBar').className = 'reaction-bar';
}

function doReact(seatNum, cardId) {
  sockets[seatNum].emit('game:action', { type: 'reaction', cardId });
  log(`P${seatNum} reacts with #${cardId}`, 'action');
}

function doReactPass(seatNum) {
  sockets[seatNum].emit('game:action', { type: 'reaction', pass: true });
  log(`P${seatNum} passes reaction`, 'action');
}

// ========== Utilities ==========

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function log(msg, cls) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = cls || '';
  const time = new Date().toLocaleTimeString();
  div.textContent = `[${time}] ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
</script>
