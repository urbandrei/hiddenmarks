version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: hiddenmarks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hiddenmarks
      POSTGRES_PASSWORD: hiddenmarks123
      POSTGRES_DB: hiddenmarks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiddenmarks"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hiddenmarks-server
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://hiddenmarks:hiddenmarks123@db:5432/hiddenmarks
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    command: npm run dev

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hiddenmarks-client
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres_data:
